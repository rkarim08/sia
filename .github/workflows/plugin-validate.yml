name: Plugin Validation
on:
  pull_request:
  push:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Plugin validator
        run: bash scripts/validate-plugin.sh
      - name: Tests
        run: bun run test
      - name: Type check
        run: bunx tsc --noEmit
      - name: Lint
        run: bunx @biomejs/biome check .
