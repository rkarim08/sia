name: Plugin Validation
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: plugin-validate-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Plugin validator
        run: bash scripts/validate-plugin.sh
# Note: test / tsc / lint run under the sibling `ci.yaml` workflow.
# The validator only needs bash + jq (no bun install) so it stays lean.
