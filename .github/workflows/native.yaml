name: Build @sia/native

on:
  push:
    paths: ['sia-native/**']
  pull_request:
    paths: ['sia-native/**']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          # macOS
          - target: x86_64-apple-darwin
            host: macos-13
          - target: aarch64-apple-darwin
            host: macos-14
          # Linux (glibc)
          - target: x86_64-unknown-linux-gnu
            host: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            host: ubuntu-latest
          # Linux (musl — Alpine, distroless)
          - target: x86_64-unknown-linux-musl
            host: ubuntu-latest
          # Windows
          - target: x86_64-pc-windows-msvc
            host: windows-latest

    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.settings.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sia-native/package-lock.json
      - name: Install cross-compilation tools (aarch64)
        if: matrix.settings.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install musl tools
        if: matrix.settings.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install dependencies
        working-directory: sia-native
        run: npm install
      - name: Build
        working-directory: sia-native
        run: npx napi build --platform --release --target ${{ matrix.settings.target }}
      - name: Test
        if: matrix.settings.target != 'aarch64-unknown-linux-gnu'
        working-directory: sia-native
        run: node -e "const m = require('./index.js'); console.log('Native module loaded:', Object.keys(m))"
      - uses: actions/upload-artifact@v4
        with:
          name: binding-${{ matrix.settings.target }}
          path: sia-native/*.node
