<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIA Knowledge Graph</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-mono/style.min.css" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body {
        background: #0c0c1a;
        color: #cdd6e4;
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 13px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Scale up for large/ultrawide displays */
      @media (min-width: 2000px) {
        body { font-size: 16px; }
      }
      @media (min-width: 2800px) {
        body { font-size: 19px; }
      }
      @media (min-width: 3400px) {
        body { font-size: 22px; }
      }
      /* Subtle scrollbar */
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }
      /* Focus ring */
      :focus-visible { outline: 1px solid rgba(99,102,241,0.5); outline-offset: 2px; }
      /* Selection */
      ::selection { background: rgba(99,102,241,0.3); }
      @keyframes drift1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(80px, -60px); } }
      @keyframes drift2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-60px, 80px); } }
      @keyframes drift3 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(40px, 50px); } }
      @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes fadeInDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
